<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
    }

    body {
      width: 320px;
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
    }

    .container {
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--primary), #a855f7);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }

    h1 {
      font-size: 18px;
      margin: 0;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background-color: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .status-idle {
      background: rgba(148, 163, 184, 0.1);
      color: var(--text-muted);
    }

    .status-syncing {
      background: rgba(99, 102, 241, 0.1);
      color: var(--primary);
    }

    .status-completed {
      background: rgba(16, 185, 129, 0.1);
      color: var(--success);
    }

    .status-error {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
    }

    .progress-container {
      margin-top: 8px;
    }

    .progress-bar-bg {
      height: 6px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-top: 8px;
      color: var(--text-muted);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .config-field {
      margin-top: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px;
      border-radius: 6px;
      color: white;
      font-size: 12px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
    }

    /* Tab styles */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      padding: 4px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      background: transparent;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--card);
      color: white;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .tab-content {
      display: none;
      flex-direction: column;
    }

    .tab-content.active {
      display: flex;
    }

    .logs-panel {
      flex-direction: column;
      gap: 8px;
    }

    .logs-container {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      height: 250px;
      overflow-y: auto;
      padding: 10px;
      font-size: 11px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .history-item {
      padding: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-meta {
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
    }

    .log-time {
      color: var(--text-muted);
      font-size: 9px;
      display: block;
      margin-bottom: 2px;
    }

    .btn-logs {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-logs:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <div style="display: flex; align-items: center; gap: 8px;">
        <div class="logo">N</div>
        <h1>Naboo Sync</h1>
      </div>
      <button id="openDashboardBtn" class="btn-logs" style="margin-top: 0; padding: 4px 8px; font-size: 10px;" aria-label="Open Dashboard in new tab">Dashboard
        <span aria-hidden="true">↗</span></button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="sync">Sync</button>
      <button class="tab-btn" data-tab="history">History</button>
      <button class="tab-btn" data-tab="logs">Logs</button>
    </div>

    <!-- Sync Tab -->
    <div id="syncTab" class="tab-content active">
      <div class="card">
        <div id="statusBadge" class="status-badge status-idle">Idle</div>

        <div class="progress-container">
          <div class="progress-bar-bg">
            <div id="progressBar" class="progress-bar-fill"></div>
          </div>
          <div class="progress-text">
            <span id="progressLabel">Waiting to start...</span>
            <span id="progressCount">0/0</span>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="startBtn" class="btn-primary">Start Synchronization</button>
        <button id="stopBtn" class="btn-secondary" style="display: none;">Stop</button>

        <div class="config-field">
          <label for="baseUrlInput">Base URL</label>
          <input type="text" id="baseUrlInput" placeholder="https://arabpsychology.com">
        </div>
      </div>
    </div>

    <!-- History Tab -->
    <div id="historyTab" class="tab-content">
      <div class="card" style="padding: 0; background: rgba(0,0,0,0.1);">
        <div id="historyContainer" class="logs-container" style="height: 320px; background: transparent; border: none;">
          <!-- History items will be injected here -->
        </div>
      </div>
      <button id="clearHistoryBtn" class="btn-logs" style="margin-top: 12px; align-self: flex-end;">Clear
        History</button>
    </div>

    <!-- Logs Tab -->
    <div id="logsTab" class="tab-content">
      <div class="logs-panel" style="display: flex;">
        <div id="logsContainer" class="logs-container" style="height: 280px;">
          <!-- Logs will be injected here -->
        </div>
        <button id="clearLogsBtn" class="btn-logs" style="margin-top: 12px; align-self: flex-end;">Clear Logs</button>
      </div>
    </div>

    <div class="footer">
      Generated for Arab Psychology • Naboo Database
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
